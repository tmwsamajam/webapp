<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — TMWS</title>
  <meta name="description" content="Photo gallery of TMWS festivals, service programs, and community moments." />
  <link rel="canonical" href="https://tmwsamajam.github.io/webapp/gallery.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Gallery — TMWS" />
  <meta property="og:description" content="Photo gallery of TMWS festivals, service programs, and community moments." />
  <meta property="og:image" content="assets/images/logo/tmws-logo.svg" />
  <meta property="og:url" content="https://tmwsamajam.github.io/webapp/gallery.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Gallery — TMWS" />
  <meta name="twitter:description" content="Photo gallery of TMWS festivals, service programs, and community moments." />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" href="assets/images/logo/tmws-logo.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem("tmws-theme");
        if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  
</head><body data-page="gallery">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="scroll-progress" data-scroll-progress role="presentation"></div>
  <div class="page-loader" data-page-loader aria-hidden="true"><div class="page-loader__spinner" role="status" aria-label="Loading"></div></div>
  <div data-header-mount></div>
  <main id="main">
    <section class="page-hero">
      <div class="container">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="index.html">Home</a>
          <span class="breadcrumb__sep" aria-hidden="true">/</span>
          <span aria-current="page">Gallery</span>
        </nav>
        <h1 class="page-hero__title reveal">Gallery</h1>
        <p class="page-hero__desc reveal">A living album of festivals, service, and everyday joy.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="filter-bar reveal">
          <div class="search-bar">
            <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <input class="search-bar__input" type="search" placeholder="Search gallery…" data-gallery-search aria-label="Search gallery" />
          </div>
          <div class="tag-list" role="group" aria-label="Filter gallery">
            <button type="button" class="tag is-active" data-gallery-filter="all">All</button>
            <button type="button" class="tag" data-gallery-filter="Cultural">Cultural</button>
            <button type="button" class="tag" data-gallery-filter="Community">Community</button>
            <button type="button" class="tag" data-gallery-filter="Medical">Medical</button>
            <button type="button" class="tag" data-gallery-filter="Sports">Sports</button>
            <button type="button" class="tag" data-gallery-filter="Youth">Youth</button>
            <button type="button" class="tag" data-gallery-filter="Welfare">Welfare</button>
          </div>
        </div>
        <div class="gallery-grid" data-gallery-grid></div>
      </div>
    </section>
  </main>

  <div data-footer-mount></div>
  <script src="assets/js/theme.js" defer></script>
  <script src="assets/js/navigation.js" defer></script>
  <script src="assets/js/animations.js" defer></script>
  <script src="assets/js/counter.js" defer></script>
  <script src="assets/js/gallery.js" defer></script>
  <script src="assets/js/main.js" defer></script>
</body>
</html>
